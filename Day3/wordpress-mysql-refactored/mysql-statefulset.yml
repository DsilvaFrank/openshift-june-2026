apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  serviceName: mysql
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      volumes:
      - name: mysql-shared-storage
        persistentVolumeClaim:
          claimName: mysql-pvc-jegan    # Replace 'jegan' with your name
      - name: setup-script
        configMap:
          name: mysql-setup-cm
          defaultMode: 0755

      containers:

      # Main MariaDB container. No replication config here - the setup
      # sidecar handles everything after mysqld is ready.
      - name: mysql
        image: image-registry.openshift-image-registry.svc:5000/openshift/mariadb:1.0
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3306

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        readinessProbe:
          exec:
            command:
            - bash
            - "-c"
            - "mariadb -uroot -p\"${MARIADB_ROOT_PASSWORD}\" -e 'SELECT 1'"
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5

        livenessProbe:
          exec:
            command:
            - bash
            - "-c"
            - "mariadb-admin -uroot -p\"${MARIADB_ROOT_PASSWORD}\" ping"
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5

        volumeMounts:
        - name: mysql-shared-storage
          mountPath: /bitnami/mariadb/data
          subPathExpr: $(MY_POD_NAME)

        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: password
        - name: MARIADB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: wordpress-cm
              key: db_name
        - name: MARIADB_REPLICATION_USER
          value: replicator
        - name: MARIADB_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: replication-password

      # Setup sidecar: runs alongside mysqld on every pod, every boot.
      # Determines its role from the pod ordinal, waits for local mysqld,
      # then configures replication. Idempotent - safe to run on restart.
      # Mirrors the pattern from the reference example exactly.
      - name: setup
        image: image-registry.openshift-image-registry.svc:5000/openshift/mariadb:1.0
        imagePullPolicy: IfNotPresent
        command:
        - bash
        - /scripts/setup.sh
        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: password
        - name: MARIADB_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: replication-password
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: setup-script
          mountPath: /scripts
