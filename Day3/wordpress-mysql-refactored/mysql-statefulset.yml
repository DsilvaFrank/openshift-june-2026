apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  serviceName: mysql
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      volumes:
      - name: mysql-shared-storage
        persistentVolumeClaim:
          claimName: mysql-pvc-jegan    # Replace 'jegan' with your name
      - name: conf
        emptyDir: {}

      initContainers:

      # INIT CONTAINER 1: init-server-id
      # Computes a unique server-id from the Pod ordinal and writes it into
      # /opt/bitnami/mariadb/conf/my.cnf by appending to it before MariaDB
      # starts. Uses a copy of my.cnf already present in the image.
      # mysql-0 -> server_id=1 + binary logging (primary)
      # mysql-1 -> server_id=2 + read_only (replica)
      # mysql-2 -> server_id=3 + read_only (replica)
      - name: init-server-id
        image: image-registry.openshift-image-registry.svc:5000/openshift/mariadb:1.0
        command:
        - bash
        - "-c"
        - |
          set -ex
          [[ ${MY_POD_NAME} =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}
          server_id=$((ordinal + 1))

          echo "Pod=${MY_POD_NAME} ordinal=${ordinal} server_id=${server_id}"

          # Copy the base my.cnf from the image into the emptyDir volume,
          # then append the replication settings for this Pod.
          cp /opt/bitnami/mariadb/conf/my.cnf /mnt/conf/my.cnf

          if [[ $ordinal -eq 0 ]]; then
            cat >> /mnt/conf/my.cnf <<CFG

          [mysqld]
          server_id=${server_id}
          log_bin=mariadb-bin
          binlog_format=ROW
          CFG
          else
            cat >> /mnt/conf/my.cnf <<CFG

          [mysqld]
          server_id=${server_id}
          read_only=1
          CFG
          fi

          echo "Final my.cnf [mysqld] section:"
          grep -A5 "^\[mysqld\]" /mnt/conf/my.cnf | tail -10
        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: conf
          mountPath: /mnt/conf

      # INIT CONTAINER 2: clone-mysql
      # Skips on mysql-0. On replicas: waits for mysql-0 and the replicator
      # user to exist, then configures and starts replication.
      - name: clone-mysql
        image: image-registry.openshift-image-registry.svc:5000/openshift/mariadb:1.0
        command:
        - bash
        - "-c"
        - |
          set -ex
          [[ ${MY_POD_NAME} =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}

          [[ $ordinal -eq 0 ]] && exit 0

          until mariadb -h mysql-0.mysql -uroot -p"${MARIADB_ROOT_PASSWORD}" -e "SELECT 1" 2>/dev/null; do
            echo "Waiting for mysql-0 to accept connections..."
            sleep 3
          done

          until mariadb -h mysql-0.mysql -ureplicator -p"${MARIADB_REPLICATION_PASSWORD}" -e "SELECT 1" 2>/dev/null; do
            echo "Waiting for replicator user on mysql-0..."
            sleep 5
          done

          mariadb -h mysql-0.mysql -uroot -p"${MARIADB_ROOT_PASSWORD}" <<SQL
          STOP SLAVE;
          CHANGE MASTER TO
            MASTER_HOST='mysql-0.mysql',
            MASTER_USER='replicator',
            MASTER_PASSWORD='${MARIADB_REPLICATION_PASSWORD}',
            MASTER_PORT=3306,
            MASTER_CONNECT_RETRY=10;
          START SLAVE;
          SQL
        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: password
        - name: MARIADB_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: replication-password

      containers:
      - name: mysql
        image: image-registry.openshift-image-registry.svc:5000/openshift/mariadb:1.0
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3306

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        readinessProbe:
          exec:
            command:
            - bash
            - "-c"
            - "mariadb -uroot -p\"${MARIADB_ROOT_PASSWORD}\" -e 'SELECT 1'"
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5

        livenessProbe:
          exec:
            command:
            - bash
            - "-c"
            - "mariadb-admin -uroot -p\"${MARIADB_ROOT_PASSWORD}\" ping"
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5

        volumeMounts:
        - name: mysql-shared-storage
          mountPath: /bitnami/mariadb/data
          subPathExpr: $(MY_POD_NAME)
        - name: conf
          # Mounts the customised my.cnf (written by init-server-id) over
          # the image's default my.cnf. MariaDB reads this file at startup
          # and picks up the correct server_id for this Pod.
          mountPath: /opt/bitnami/mariadb/conf/my.cnf
          subPath: my.cnf

        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: password

        - name: MARIADB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: wordpress-cm
              key: db_name

        - name: MARIADB_REPLICATION_USER
          value: replicator

        - name: MARIADB_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: replication-password
