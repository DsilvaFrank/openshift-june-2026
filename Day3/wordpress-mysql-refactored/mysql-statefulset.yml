apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  serviceName: mysql
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      volumes:
      - name: mysql-shared-storage
        persistentVolumeClaim:
          claimName: mysql-pvc-jegan    # Replace 'jegan' with your name

      initContainers:

      # Skips on mysql-0 (primary needs no replication setup).
      # On replicas: waits for mysql-0 to be up and for the replicator user
      # to exist (created by deploy.sh after mysql-0 is Ready), then runs
      # CHANGE MASTER TO and starts the replication thread.
      - name: clone-mysql
        image: image-registry.openshift-image-registry.svc:5000/openshift/mariadb:1.0
        command:
        - bash
        - "-c"
        - |
          set -ex
          [[ ${MY_POD_NAME} =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}
          [[ $ordinal -eq 0 ]] && exit 0

          until mariadb -h mysql-0.mysql -uroot -p"${MARIADB_ROOT_PASSWORD}" -e "SELECT 1" 2>/dev/null; do
            echo "Waiting for mysql-0..."
            sleep 3
          done

          until mariadb -h mysql-0.mysql -ureplicator -p"${MARIADB_REPLICATION_PASSWORD}" -e "SELECT 1" 2>/dev/null; do
            echo "Waiting for replicator user on mysql-0..."
            sleep 5
          done

          mariadb -h mysql-0.mysql -uroot -p"${MARIADB_ROOT_PASSWORD}" <<SQL
          STOP SLAVE;
          CHANGE MASTER TO
            MASTER_HOST='mysql-0.mysql',
            MASTER_USER='replicator',
            MASTER_PASSWORD='${MARIADB_REPLICATION_PASSWORD}',
            MASTER_PORT=3306,
            MASTER_CONNECT_RETRY=10;
          START SLAVE;
          SQL
        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: password
        - name: MARIADB_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: replication-password

      containers:
      - name: mysql
        image: image-registry.openshift-image-registry.svc:5000/openshift/mariadb:1.0
        imagePullPolicy: IfNotPresent

        # Bitnami rewrites /opt/bitnami/mariadb/conf/my.cnf on every Pod start,
        # so appending server-id there does not survive restarts. The only
        # reliable injection point is DB_EXTRA_FLAGS, which run.sh passes
        # directly to mariadbd. We wrap the entrypoint in a bash command that
        # computes the correct server-id from MY_POD_NAME before exec-ing the
        # real Bitnami entrypoint.
        #   mysql-0 -> server-id=1, binary logging ON  (primary/writer)
        #   mysql-1 -> server-id=2, read-only ON       (replica)
        #   mysql-2 -> server-id=3, read-only ON       (replica)
        command:
        - bash
        - "-c"
        - |
          set -ex
          [[ ${MY_POD_NAME} =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}
          server_id=$((ordinal + 1))

          if [[ $ordinal -eq 0 ]]; then
            export DB_EXTRA_FLAGS="--server-id=${server_id} --log-bin=mariadb-bin --binlog-format=ROW"
          else
            export DB_EXTRA_FLAGS="--server-id=${server_id} --read-only=1"
          fi

          echo "Pod=${MY_POD_NAME} server-id=${server_id} DB_EXTRA_FLAGS=${DB_EXTRA_FLAGS}"
          exec /opt/bitnami/scripts/mariadb/entrypoint.sh /opt/bitnami/scripts/mariadb/run.sh

        ports:
        - containerPort: 3306

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        readinessProbe:
          exec:
            command:
            - bash
            - "-c"
            - "mariadb -uroot -p\"${MARIADB_ROOT_PASSWORD}\" -e 'SELECT 1'"
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5

        livenessProbe:
          exec:
            command:
            - bash
            - "-c"
            - "mariadb-admin -uroot -p\"${MARIADB_ROOT_PASSWORD}\" ping"
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5

        volumeMounts:
        - name: mysql-shared-storage
          mountPath: /bitnami/mariadb/data
          subPathExpr: $(MY_POD_NAME)

        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: password
        - name: MARIADB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: wordpress-cm
              key: db_name
        - name: MARIADB_REPLICATION_USER
          value: replicator
        - name: MARIADB_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: replication-password
