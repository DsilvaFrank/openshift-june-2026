apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  serviceName: mysql
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      volumes:
      - name: mysql-shared-storage
        persistentVolumeClaim:
          claimName: mysql-pvc-jegan    # Replace 'jegan' with your name
      - name: setup-script
        configMap:
          name: mysql-setup-cm
          defaultMode: 0755

      containers:

      # Main MariaDB container.
      # Uses a command wrapper to compute server-id from the pod ordinal
      # and set DB_EXTRA_FLAGS before exec-ing the Bitnami entrypoint.
      # DB_EXTRA_FLAGS is appended to mariadbd startup flags by run.sh,
      # making this the only reliable way to pass --log-bin with Bitnami
      # since my.cnf is rewritten on every pod start.
      #
      # mysql-0 -> server-id=1, --log-bin (primary/writer)
      # mysql-1 -> server-id=2, --read-only (replica)
      # mysql-2 -> server-id=3, --read-only (replica)
      - name: mysql
        image: image-registry.openshift-image-registry.svc:5000/openshift/mariadb:1.0
        imagePullPolicy: IfNotPresent

        command:
        - bash
        - "-c"
        - |
          set -ex
          [[ ${MY_POD_NAME} =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}
          server_id=$((ordinal + 1))

          if [[ $ordinal -eq 0 ]]; then
            export DB_EXTRA_FLAGS="--server-id=${server_id} --log-bin=mariadb-bin --binlog-format=ROW"
          else
            export DB_EXTRA_FLAGS="--server-id=${server_id} --read-only=1"
          fi

          echo "Pod=${MY_POD_NAME} server-id=${server_id} DB_EXTRA_FLAGS=${DB_EXTRA_FLAGS}"
          exec /opt/bitnami/scripts/mariadb/entrypoint.sh /opt/bitnami/scripts/mariadb/run.sh

        ports:
        - containerPort: 3306

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        readinessProbe:
          exec:
            command:
            - bash
            - "-c"
            - "mariadb -uroot -p\"${MARIADB_ROOT_PASSWORD}\" -e 'SELECT 1'"
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5

        livenessProbe:
          exec:
            command:
            - bash
            - "-c"
            - "mariadb-admin -uroot -p\"${MARIADB_ROOT_PASSWORD}\" ping"
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5

        volumeMounts:
        - name: mysql-shared-storage
          mountPath: /bitnami/mariadb/data
          subPathExpr: $(MY_POD_NAME)

        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: password
        - name: MARIADB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: wordpress-cm
              key: db_name
        - name: MARIADB_REPLICATION_USER
          value: replicator
        - name: MARIADB_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: replication-password

      # Setup sidecar: runs alongside mysqld on every pod, every boot.
      # Waits for local mysqld, sets server-id, creates users on primary,
      # configures replication on replicas. Fully idempotent.
      - name: setup
        image: image-registry.openshift-image-registry.svc:5000/openshift/mariadb:1.0
        imagePullPolicy: IfNotPresent
        command:
        - bash
        - /scripts/setup.sh
        env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: password
        - name: MARIADB_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: replication-password
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: setup-script
          mountPath: /scripts
