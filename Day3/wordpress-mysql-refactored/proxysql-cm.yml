apiVersion: v1
kind: ConfigMap
metadata:
  name: proxysql-cm
data:
  proxysql.cnf: |
    datadir="/var/lib/proxysql"

    admin_variables=
    {
      # Admin interface listens on port 6032.
      # Connect with: mysql -h <proxysql-pod-ip> -P6032 -uproxyadmin -pproxyadmin@123
      admin_credentials="proxyadmin:proxyadmin@123"
      mysql_ifaces="0.0.0.0:6032"
    }

    mysql_variables=
    {
      # Port 6033 is where MySQL clients (WordPress) connect.
      interfaces="0.0.0.0:6033"
      default_query_delay=0
      default_query_timeout=36000000
      max_connections=2048
      default_schema="wordpress"
    }

    # mysql_servers defines the backend MySQL pods.
    # hostgroup 10 = writers  -> mysql-0.mysql (the primary, handles writes)
    # hostgroup 20 = readers  -> mysql-0, mysql-1, mysql-2 (all can serve reads)
    # mysql-0 is in both groups so reads still work when you have only 1 replica.
    mysql_servers=
    (
      {
        address="mysql-0.mysql"
        port=3306
        hostgroup=10
        status="ONLINE"
        weight=1
        max_connections=100
        comment="primary - writer"
      },
      {
        address="mysql-0.mysql"
        port=3306
        hostgroup=20
        status="ONLINE"
        weight=1
        max_connections=100
        comment="primary - also serves reads when no replicas exist"
      },
      {
        address="mysql-1.mysql"
        port=3306
        hostgroup=20
        status="ONLINE"
        weight=1
        max_connections=100
        comment="replica 1 - reader"
      },
      {
        address="mysql-2.mysql"
        port=3306
        hostgroup=20
        status="ONLINE"
        weight=1
        max_connections=100
        comment="replica 2 - reader"
      }
    )

    # mysql_users defines which credentials WordPress uses to connect.
    # default_hostgroup=10 means unmatched queries go to the writer by default.
    mysql_users=
    (
      {
        username="root"
        password="root@123"
        default_hostgroup=10
        active=1
      }
    )

    # mysql_query_rules is the core of ProxySQL.
    # Rules are evaluated top to bottom; first match wins.
    #
    # Rule 1: SELECT ... FOR UPDATE must go to the writer (hostgroup 10).
    #         This is used by WordPress for row locking during transactions.
    #         If this went to a replica it would fail because replicas are read-only.
    #
    # Rule 2: All other SELECT queries go to readers (hostgroup 20).
    #         ProxySQL round-robins across mysql-0, mysql-1, mysql-2.
    #
    # Everything else (INSERT, UPDATE, DELETE, CREATE, etc.) falls through
    # to the default_hostgroup=10 set in mysql_users, which is the writer.
    mysql_query_rules=
    (
      {
        rule_id=1
        active=1
        match_pattern="^SELECT .* FOR UPDATE"
        destination_hostgroup=10
        apply=1
        comment="SELECT FOR UPDATE -> writer"
      },
      {
        rule_id=2
        active=1
        match_pattern="^SELECT"
        destination_hostgroup=20
        apply=1
        comment="SELECT -> readers (round-robin across hostgroup 20)"
      }
    )
