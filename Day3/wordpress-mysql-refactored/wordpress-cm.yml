apiVersion: v1
kind: ConfigMap
metadata:
  name: wordpress-cm
data:
  db_name: wordpress
  db_service_name: proxysql
  db_service_port: "6033"
  # Public hostname of the OpenShift Route.
  # Bitnami WordPress image reads WORDPRESS_HOSTNAME from this value
  # and writes it as siteurl and home in wp_options during first install.
  # If you redeploy to a different cluster, update this and re-apply.
  site_hostname: wordpress-jegan.apps.ocp4.palmeto.org
