apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  # Headless service: clusterIP: None gives each Pod its own DNS entry.
  # mysql-0.mysql.<namespace>.svc.cluster.local resolves directly to mysql-0's IP.
  # WordPress connects to mysql-0.mysql, always hitting the primary Pod.
  clusterIP: None
  ports:
  - port: 3306
    protocol: TCP
    targetPort: 3306
  selector:
    app: mysql
